name: package
on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  package:
    name: Package
    runs-on: ubuntu-24.04
    steps:
      - name: Install Tinymist from GitHub Releases
        uses: sigoden/install-binary@v1.2.0
        with:
          repo: Myriad-Dreamin/tinymist
          name: tinymist-linux-x64
          cache: true
      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: 3.14
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Setup virtual environment
        run: |
          python3 -m pip install -U pip
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -e .
      - name: Build
        run: .venv/bin/python3 -m doit
      - name: Package/Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "latest"
          prerelease: true
          title: "Development Build"
          files: |
            target/*.pdf
